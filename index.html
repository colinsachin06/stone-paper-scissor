<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width , initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Uncial+Antiqua&display=swap" rel="stylesheet">		<link rel="stylesheet" href="style.css">
		<script src="script.js"  defer></script>
		<title>Rock-Paper_scissor</title>
	</head>
	<body>
		
		<div class="title">
		<p>Human <span id="human-score">0</span></p>
		<img  src="images/heading2.png" alt="rock-paper-scissor">
		<p>Computer <span id="computer-score">0</span></p>
		</div>
		<div class ="gameBar">
			<div class="choice">
				<img id="rock" src="images/rock1.png" alt="rock">
				<p>Rock</p>
			</div>
			<div class="choice">
				<img id="paper" src="images/paper1.png" alt="paper">
				<p>Paper</p>
			</div>
			<div class="choice">
				<img id="scissors" src="images/scissor1.png" alt="scissor">
				<p>Scissors</p>
			</div>
		</div>
	</body>
</html>
